<!-- ── ISSUE MODAL ───────────────────────────────────────── -->
<div class="modal-backdrop" id="issue-modal" role="dialog" aria-modal="true" aria-labelledby="issue-modal-title-text">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="issue-modal-title-text">Issue</div>
        <div class="modal-subtitle" id="issue-modal-subtitle"></div>
      </div>
      <button class="modal-close js-close-issue" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-loading" id="issue-modal-loading">
        <div class="spinner"></div>
        <span>Loading…</span>
      </div>
      <iframe id="issue-iframe" title="Issue Form"></iframe>
    </div>
  </div>
</div>
