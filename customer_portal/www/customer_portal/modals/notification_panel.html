<!-- ── NOTIFICATION PANEL ────────────────────────────────── -->
<div class="notif-panel-backdrop" id="notif-backdrop">
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <div class="notif-panel-title">
        Notificaciones
        <span class="notif-count-pill" id="notif-count-pill" style="display:none"></span>
      </div>
      <button class="notif-mark-all" id="notif-mark-all-btn" disabled>Marcar todo como leído</button>
    </div>
    <div class="notif-list" id="notif-list">
      <div class="notif-loading">
        <div class="spinner"></div>
        <span>Cargando notificaciones…</span>
      </div>
    </div>
  </div>
</div>
